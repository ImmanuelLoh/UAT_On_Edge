<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Task 3 - Targeted Selection</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding-top: 50px;
            background-color: #f4f7f6;
            margin: 0;
        }

        #instruction-box {
            background: white;
            padding: 20px;
            display: inline-block;
            border-radius: 10px;
            shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            border: 2px solid #333;
        }

        #target-numbers {
            font-size: 1.5rem;
            color: #007bff;
            font-weight: bold;
            letter-spacing: 2px;
        }

        #selection-grid {
            display: grid;
            grid-template-columns: repeat(4, 120px);
            gap: 15px;
            justify-content: center;
            margin: 20px auto;
        }

        /* Making the whole box clickable */
        .option-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 30px 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        /* Hide the actual checkbox but keep it functional */
        .task-checkbox {
            display: none;
        }

        /* Visual feedback for selection */
        .option-label:hover {
            border-color: #007bff;
            background-color: #f0f7ff;
        }

        .option-label.selected {
            border-color: #007bff;
            background-color: #e7f3ff;
            box-shadow: inset 0 0 5px rgba(0, 123, 255, 0.2);
            font-weight: bold;
        }

        #btn-submit-selection {
            margin-top: 30px;
            padding: 12px 50px;
            font-size: 18px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        #btn-submit-selection:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }

        #error-msg {
            color: #d9534f;
            margin-top: 10px;
            font-weight: bold;
            visibility: hidden;
        }
    </style>
</head>

<body>

    <div id="instruction-box">
        <h2 style="margin: 0;">Task: Select these 3 numbers:</h2>
        <div id="target-numbers">Generating...</div>
    </div>

    <form id="task-form" onsubmit="return validateSubmission(event)">
        <div id="selection-grid">
            {% for i in range(1, 13) %}
            <label class="option-label" id="label-{{ i }}">
                <input type="checkbox" name="options" class="task-checkbox" value="{{ i }}"
                    onchange="toggleHighlight(this, 'label-{{ i }}')">
                <span style="font-size: 1.2rem;">{{ i }}</span>
            </label>
            {% endfor %}
        </div>

        <button type="submit" id="btn-submit-selection" disabled>Submit Selection</button>
        <div id="error-msg">Incorrect selection. Please follow the instructions.</div>
    </form>

    <script>
        let requiredNumbers = [];

        // 1. Generate 3 random target numbers on load
        function initPage() {
            // const allNumbers = Array.from({ length: 12 }, (_, i) => i + 1);
            // requiredNumbers = allNumbers.sort(() => 0.5 - Math.random()).slice(0, 3).sort((a, b) => a - b);
            
            requiredNumbers = [1, 3, 7];

            document.getElementById('target-numbers').innerText = requiredNumbers.join(', ');
        }

        // 2. Visual toggle for "clickable box" effect
        function toggleHighlight(checkbox, labelId) {
            const label = document.getElementById(labelId);
            if (checkbox.checked) {
                label.classList.add('selected');
            } else {
                label.classList.remove('selected');
            }

            // Enable button only if 3 boxes are checked
            const checkedCount = document.querySelectorAll('.task-checkbox:checked').length;
            document.getElementById('btn-submit-selection').disabled = (checkedCount !== 3);
        }

        // 3. Final Validation
        function validateSubmission(event) {
            event.preventDefault();
            const selected = Array.from(document.querySelectorAll('.task-checkbox:checked')).map(cb => parseInt(cb.value));

            // Check if selected matches required (sorting ensures order doesn't matter)
            const isCorrect = selected.length === 3 && selected.every(n => requiredNumbers.includes(n));

            if (isCorrect) {
                window.location.href = "/complete";
            } else {
                const error = document.getElementById('error-msg');
                error.style.visibility = 'visible';
                setTimeout(() => { error.style.visibility = 'hidden'; }, 2500);
            }
        }

        window.onload = initPage;
    </script>
</body>

</html>
