<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #f6f8fb;
    --surface: #ffffff;
    --surface-soft: #f8fafc;
    --border: #e5e7eb;
    --border-strong: #d1d5db;
    --text: #111827;
    --text-muted: #6b7280;
    --text-soft: #94a3b8;
    --primary: #2563eb;
    --primary-soft: #eff6ff;
    --success: #16a34a;
    --success-soft: #f0fdf4;
    --danger: #dc2626;
    --danger-soft: #fef2f2;
    --warn: #d97706;
    --warn-soft: #fffbeb;
    --shadow: 0 10px 25px rgba(15, 23, 42, 0.06);
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: linear-gradient(180deg, #f8fafc 0%, #f4f7fb 100%);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  .page-wrap {
    max-width: 1440px;
    margin: 0 auto;
    padding: 24px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
    padding: 20px 22px;
    background: rgba(255,255,255,0.9);
    border: 1px solid rgba(229,231,235,0.8);
    border-radius: 20px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(8px);
    position: sticky;
    top: 16px;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: var(--primary-soft);
    color: var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 18px;
  }

  .logo-text {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .logo-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .logo-subtitle {
    font-size: 12px;
    color: var(--text-muted);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .live-badge,
  .updated-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface-soft);
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 500;
  }

  .live-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 0 4px rgba(22,163,74,0.12);
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%,100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(0.82); opacity: 0.7; }
  }

  .refresh-btn {
    border: 1px solid var(--border-strong);
    background: #fff;
    color: var(--text);
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: 0.2s ease;
  }

  .refresh-btn:hover {
    background: var(--primary-soft);
    border-color: #bfdbfe;
    color: var(--primary);
  }

  .refresh-btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
  }

  .refresh-btn.spinning .btn-icon {
    display: inline-block;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .summary-bar {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .summary-stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .stat-label {
    font-size: 12px;
    color: var(--text-muted);
  }

  .stat-value {
    font-size: 30px;
    font-weight: 700;
    line-height: 1;
  }

  .stat-hint {
    font-size: 12px;
    color: var(--text-soft);
  }

  .stat-labs .stat-value { color: #7c3aed; }
  .stat-total .stat-value { color: var(--primary); }
  .stat-active .stat-value { color: var(--success); }
  .stat-inactive .stat-value { color: var(--danger); }

  main {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .lab-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .lab-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    padding: 18px 20px;
    cursor: pointer;
    background: #fff;
  }

  .lab-header:hover {
    background: #fbfdff;
  }

  .lab-title-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .lab-title {
    font-size: 18px;
    font-weight: 700;
  }

  .lab-tag {
    padding: 6px 10px;
    border-radius: 999px;
    background: var(--primary-soft);
    color: var(--primary);
    font-size: 12px;
    font-weight: 600;
  }

  .lab-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .lab-meta-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
  }

  .active-pill {
    color: var(--success);
    background: var(--success-soft);
    border: 1px solid #bbf7d0;
  }

  .inactive-pill {
    color: var(--danger);
    background: var(--danger-soft);
    border: 1px solid #fecaca;
  }

  .collapse-icon {
    color: var(--text-muted);
    transition: transform 0.2s ease;
  }

  .lab-section.collapsed .collapse-icon { transform: rotate(-90deg); }
  .lab-section.collapsed .computer-grid { display: none; }

  .computer-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 16px;
    padding: 0 20px 20px;
    background: #fff;
  }

  .computer-card {
    border: 1px solid var(--border);
    border-radius: 16px;
    background: var(--surface-soft);
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .computer-card.status-active {
    border-color: #bbf7d0;
    background: linear-gradient(180deg, #ffffff 0%, #f7fff9 100%);
  }

  .computer-card.status-inactive {
    border-color: #fecaca;
    background: linear-gradient(180deg, #ffffff 0%, #fff8f8 100%);
  }

  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .computer-name {
    font-size: 16px;
    font-weight: 700;
  }

  .status-badge {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 7px 10px;
    border-radius: 999px;
  }

  .badge-active {
    background: var(--success-soft);
    color: var(--success);
    border: 1px solid #bbf7d0;
  }

  .badge-inactive {
    background: var(--danger-soft);
    color: var(--danger);
    border: 1px solid #fecaca;
  }

  .badge-unknown {
    background: #f3f4f6;
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  .task-row,
  .session-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 12px;
    background: #fff;
    border: 1px solid var(--border);
  }

  .task-label,
  .session-label {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 600;
  }

  .task-value,
  .session-id {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .metrics-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .metric-block {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .metric-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
  }

  .metric-rows {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .metric-row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    font-size: 13px;
  }

  .metric-key { color: var(--text-muted); }
  .metric-val { color: var(--text); font-weight: 600; text-align: right; }
  .metric-val.good { color: var(--success); }
  .metric-val.warn { color: var(--warn); }
  .metric-val.bad { color: var(--danger); }

  .attention-wrap { display: flex; flex-direction: column; gap: 6px; }
  .attention-bar-bg {
    height: 8px;
    border-radius: 999px;
    background: #e5e7eb;
    overflow: hidden;
  }
  .attention-bar-fill {
    height: 100%;
    border-radius: 999px;
    background: var(--success);
    transition: width 0.35s ease;
  }
  .attention-bar-fill.medium { background: var(--warn); }
  .attention-bar-fill.low { background: var(--danger); }

  .emotion-tag {
    font-size: 11px;
    font-weight: 700;
    padding: 5px 8px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .emotion-NEUTRAL   { background: #f3f4f6; color:#6b7280; }
  .emotion-HAPPY     { background: #f0fdf4; color:#15803d; }
  .emotion-SAD       { background: #eff6ff; color:#2563eb; }
  .emotion-ANGRY     { background: #fef2f2; color:#dc2626; }
  .emotion-SURPRISED { background: #fffbeb; color:#d97706; }
  .emotion-FEARFUL   { background: #f5f3ff; color:#7c3aed; }
  .emotion-DISGUSTED { background: #fff7ed; color:#c2410c; }

  .loading-overlay,
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 80px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: var(--shadow);
    color: var(--text-muted);
    text-align: center;
  }

  .spinner {
    width: 34px;
    height: 34px;
    border: 3px solid #dbeafe;
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .error-box {
    padding: 22px;
    background: #fff;
    border: 1px solid #fecaca;
    border-radius: 18px;
    box-shadow: var(--shadow);
    color: var(--danger);
    line-height: 1.8;
  }

  .error-box code {
    background: #f8fafc;
    border: 1px solid var(--border);
    padding: 2px 6px;
    border-radius: 6px;
    color: var(--text);
  }

  .muted-note {
    font-size: 13px;
    color: var(--text-soft);
  }

  @media (max-width: 1024px) {
    .summary-bar { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }

  @media (max-width: 720px) {
    .page-wrap { padding: 14px; }
    header { padding: 16px; position: static; }
    .summary-bar { grid-template-columns: 1fr; }
    .computer-grid { grid-template-columns: 1fr; padding: 0 16px 16px; }
    .lab-header { padding: 16px; align-items: flex-start; flex-direction: column; }
    .metrics-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="page-wrap">
  <header>
    <div class="logo">
      <div class="logo-icon">LW</div>
      <div class="logo-text">
        <div class="logo-title">LabWatch</div>
        <div class="logo-subtitle">Live monitoring dashboard</div>
      </div>
    </div>
    <div class="header-right">
      <div class="live-badge"><div class="live-dot"></div>Live data</div>
      <div class="updated-badge" id="last-updated">Updated —</div>
      <button class="refresh-btn" id="refresh-btn" onclick="loadDashboard(true)">
        <span class="btn-icon">↻</span>
        Refresh
      </button>
    </div>
  </header>

  <div class="summary-bar">
    <div class="summary-stat stat-labs">
      <div class="stat-label">Labs</div>
      <div class="stat-value" id="stat-labs">—</div>
      <div class="stat-hint">Visible labs with active data</div>
    </div>
    <div class="summary-stat stat-total">
      <div class="stat-label">Computers</div>
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-hint">Machines shown on the board</div>
    </div>
    <div class="summary-stat stat-active">
      <div class="stat-label">Active</div>
      <div class="stat-value" id="stat-active">—</div>
      <div class="stat-hint">Current active sessions</div>
    </div>
    <div class="summary-stat stat-inactive">
      <div class="stat-label">Inactive</div>
      <div class="stat-value" id="stat-inactive">—</div>
      <div class="stat-hint">Current inactive sessions</div>
    </div>
  </div>

  <main id="main-content">
    <div class="loading-overlay">
      <div class="spinner"></div>
      <div>Loading dashboard…</div>
      <div class="muted-note">The page refreshes automatically every 60 seconds.</div>
    </div>
  </main>
</div>

<script>
  const PROXY_URL = "http://localhost:3000";
  const AUTO_REFRESH_MS = 60000;
  let isLoading = false;

  function fmtFloat(val, d = 1) {
    if (val === null || val === undefined || Number.isNaN(Number(val))) return '—';
    return Number(val).toFixed(d);
  }

  function fmt(val, fallback = '—') {
    return (val === null || val === undefined || val === '') ? fallback : val;
  }

  function attnClass(s) {
    if (s === null || s === undefined) return '';
    return s >= 80 ? 'good' : s >= 50 ? 'warn' : 'bad';
  }

  function attnBarClass(s) {
    if (s === null || s === undefined) return '';
    return s >= 80 ? '' : s >= 50 ? 'medium' : 'low';
  }

  function renderCard(computerId, data) {
    if (!data || (!data.sessionData && !data.tick)) {
      return `
        <div class="computer-card">
          <div class="card-top">
            <div class="computer-name">${computerId}</div>
            <span class="status-badge badge-unknown">No data</span>
          </div>
          <div class="empty-state" style="padding:24px; box-shadow:none; border-style:dashed;">
            <div>No session data found</div>
          </div>
        </div>`;
    }

    const { sessionId, sessionData, tick } = data;
    const status = sessionData?.status || 'unknown';
    const isActive = status === 'active';
    const cardClass = isActive ? 'status-active' : status === 'inactive' ? 'status-inactive' : '';
    const badgeClass = isActive ? 'badge-active' : status === 'inactive' ? 'badge-inactive' : 'badge-unknown';

    let taskHtml = `<div class="task-row"><span class="task-label">Task</span><span class="task-value">—</span></div>`;
    let faceHtml = '';
    let mouseHtml = '';

    if (tick) {
      const task = tick.browser?.task || '—';
      const face = tick.face || {};
      const mouse = tick.mouse || {};
      const emotion = face.emotion || 'NEUTRAL';
      const attn = face.attention_score ?? null;
      const attnPct = attn !== null ? Math.min(100, Math.max(0, attn)) : 0;
      const frustration = face.frustration_score ?? null;
      const blinkRate = face.blink_rate ?? null;
      const wrongClick = tick.browser?.wrong_click ?? null;

      taskHtml = `
        <div class="task-row">
          <span class="task-label">Task</span>
          <span class="task-value">${task}</span>
        </div>`;

      faceHtml = `
        <div class="metric-block">
          <div class="metric-title">Face</div>
          <div class="metric-rows">
            <div class="metric-row">
              <span class="metric-key">Attention</span>
              <span class="metric-val ${attnClass(attn)}">${attn !== null ? fmtFloat(attn) + '%' : '—'}</span>
            </div>
            ${attn !== null ? `
            <div class="attention-wrap">
              <div class="attention-bar-bg">
                <div class="attention-bar-fill ${attnBarClass(attn)}" style="width:${attnPct}%"></div>
              </div>
            </div>` : ''}
            <div class="metric-row">
              <span class="metric-key">Emotion</span>
              <span class="emotion-tag emotion-${emotion}">${emotion}</span>
            </div>
            <div class="metric-row">
              <span class="metric-key">Direction</span>
              <span class="metric-val">${fmt(face.direction)}</span>
            </div>
            <div class="metric-row">
              <span class="metric-key">Gaze</span>
              <span class="metric-val">${fmt(face.gaze_quadrant)}</span>
            </div>
            <div class="metric-row">
              <span class="metric-key">Blink rate</span>
              <span class="metric-val ${blinkRate > 30 ? 'warn' : ''}">${blinkRate !== null ? fmtFloat(blinkRate) + '/min' : '—'}</span>
            </div>
            <div class="metric-row">
              <span class="metric-key">Frustration</span>
              <span class="metric-val ${frustration > 50 ? 'bad' : frustration > 25 ? 'warn' : 'good'}">${frustration !== null ? fmtFloat(frustration) : '—'}</span>
            </div>
            <div class="metric-row">
              <span class="metric-key">Detected</span>
              <span class="metric-val ${face.face_detected ? 'good' : 'bad'}">${face.face_detected ? 'Yes' : 'No'}</span>
            </div>
          </div>
        </div>`;

      mouseHtml = `
        <div class="metric-block">
          <div class="metric-title">Mouse</div>
          <div class="metric-rows">
            <div class="metric-row">
              <span class="metric-key">Status</span>
              <span class="metric-val ${mouse.mouse_status === 'ACTIVE' ? 'good' : 'warn'}">${fmt(mouse.mouse_status)}</span>
            </div>
            <div class="metric-row">
              <span class="metric-key">Idle time</span>
              <span class="metric-val ${mouse.idle_time > 60 ? 'warn' : ''}">${mouse.idle_time !== null && mouse.idle_time !== undefined ? fmt(mouse.idle_time) + 's' : '—'}</span>
            </div>
            <div class="metric-row">
              <span class="metric-key">CPS overall</span>
              <span class="metric-val">${fmtFloat(mouse.overall_clicks_per_second, 2)}</span>
            </div>
            <div class="metric-row">
              <span class="metric-key">CPS interval</span>
              <span class="metric-val">${fmtFloat(mouse.interval_clicks_per_second, 2)}</span>
            </div>
            <div class="metric-row">
              <span class="metric-key">Correct clicks</span>
              <span class="metric-val good">${fmt(tick.browser?.correct_click)}</span>
            </div>
            <div class="metric-row">
              <span class="metric-key">Wrong clicks</span>
              <span class="metric-val ${wrongClick > 0 ? 'bad' : ''}">${fmt(wrongClick)}</span>
            </div>
          </div>
        </div>`;
    }

    return `
      <div class="computer-card ${cardClass}">
        <div class="card-top">
          <div class="computer-name">${computerId}</div>
          <span class="status-badge ${badgeClass}">${status.toUpperCase()}</span>
        </div>
        ${taskHtml}
        <div class="metrics-grid">${faceHtml}${mouseHtml}</div>
        <div class="session-row">
          <span class="session-label">Session</span>
          <span class="session-id">${sessionId || '—'}</span>
        </div>
      </div>`;
  }

  async function loadDashboard(showLoadingOverlay = false) {
    if (isLoading) return;

    const main = document.getElementById('main-content');
    const btn = document.getElementById('refresh-btn');

    isLoading = true;
    btn.classList.add('spinning');
    btn.disabled = true;

    if (showLoadingOverlay || !main.dataset.initialized) {
      main.innerHTML = `
        <div class="loading-overlay">
          <div class="spinner"></div>
          <div>Fetching lab data…</div>
          <div class="muted-note">Auto-refresh runs every 30 seconds.</div>
        </div>`;
    }

    try {
      const res = await fetch(`${PROXY_URL}/api/labs`, { cache: 'no-store' });
      if (!res.ok) throw new Error(`Proxy returned HTTP ${res.status}`);
      const payload = await res.json();
      const labs = Array.isArray(payload.labs) ? payload.labs : [];

      let totalComputers = 0;
      let totalActive = 0;
      let totalInactive = 0;
      const labsHtml = [];

      for (const { labId, computers } of labs) {
        if (!computers || computers.length === 0) continue;

        let labActive = 0;
        let labInactive = 0;
        const cards = [];

        for (const comp of computers) {
          const status = comp.sessionData?.status || 'unknown';
          if (status === 'active') {
            labActive++;
            totalActive++;
          } else if (status === 'inactive') {
            labInactive++;
            totalInactive++;
          }
          totalComputers++;
          cards.push(renderCard(comp.computerId, comp));
        }

        labsHtml.push(`
          <section class="lab-section" id="section-${labId}">
            <div class="lab-header" onclick="toggleLab('section-${labId}')">
              <div class="lab-title-wrap">
                <div class="lab-title">${labId}</div>
                <span class="lab-tag">${computers.length} PCs</span>
              </div>
              <div class="lab-meta">
                <span class="lab-meta-pill active-pill">${labActive} active</span>
                <span class="lab-meta-pill inactive-pill">${labInactive} inactive</span>
                <span class="collapse-icon">▾</span>
              </div>
            </div>
            <div class="computer-grid">${cards.join('')}</div>
          </section>`);
      }

      document.getElementById('stat-labs').textContent = labsHtml.length;
      document.getElementById('stat-total').textContent = totalComputers;
      document.getElementById('stat-active').textContent = totalActive;
      document.getElementById('stat-inactive').textContent = totalInactive;
      document.getElementById('last-updated').textContent =
        'Updated ' + new Date().toLocaleTimeString('en-SG', {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit'
        });

      main.innerHTML = labsHtml.length > 0
        ? labsHtml.join('')
        : `
          <div class="empty-state">
            <div>No lab data returned.</div>
            <div class="muted-note">Check the proxy server and Firestore data paths.</div>
          </div>`;
      main.dataset.initialized = 'true';
    } catch (err) {
      main.innerHTML = `
        <div class="error-box">
          <strong>Could not reach the proxy server</strong><br><br>
          ${err.message}<br><br>
          Make sure the server is running first:<br>
          <code>npm install</code> then <code>node server.js</code><br><br>
          Open the dashboard at: <code>http://localhost:3000/lab_dashboard_light.html</code>
        </div>`;
      console.error(err);
    } finally {
      btn.classList.remove('spinning');
      btn.disabled = false;
      isLoading = false;
    }
  }

  function toggleLab(id) {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('collapsed');
  }

  loadDashboard(true);
  setInterval(() => loadDashboard(false), AUTO_REFRESH_MS);
</script>
</body>
</html>
