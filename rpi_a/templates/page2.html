<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Task 2 - Dynamic Color Match</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .main-panel {
            padding: 0;
            overflow: hidden;
        }

        .task-page {
            margin: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            height: 100vh;
            position: relative;
            font-family: sans-serif;
            background: white;
        }

        .color-box {
            border: none;
            cursor: pointer;
            transition: filter 0.2s;
            width: 100%;
            height: 100%;
            outline: none;
        }

        .color-box:hover {
            filter: brightness(0.9);
        }

        .color-box:active {
            filter: brightness(0.7);
        }

        #color-red {
            background-color: #ff5f5f;
            grid-area: 1 / 1;
        }

        #color-blue {
            background-color: #5fafff;
            grid-area: 1 / 2;
        }

        #color-green {
            background-color: #5fff8f;
            grid-area: 2 / 1;
        }

        #color-yellow {
            background-color: #ffff5f;
            grid-area: 2 / 2;
        }

        #instruction-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border: 3px solid #333;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            z-index: 10;
            min-width: 250px;
        }

        #target-display {
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        #feedback-text {
            color: #d9534f;
            font-weight: bold;
            margin-top: 10px;
            height: 20px;
            visibility: hidden;
        }

        #nudge {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 2000;
            margin-top: 0;
        }
    </style>
</head>

<body>
    <div class="app-shell">
        <main class="main-panel">
            <div class="task-page">
                <div id="instruction-container">
                    <p id="instruction-text">The task is to click the <br><span id="target-display">...</span> square.</p>
                    <div id="feedback-text">Incorrect! Try again.</div>
                </div>

                <div id="color-red" class="color-box" onclick="checkColor('color-red')"></div>
                <div id="color-blue" class="color-box" onclick="checkColor('color-blue')"></div>
                <div id="color-green" class="color-box" onclick="checkColor('color-green')"></div>
                <div id="color-yellow" class="color-box" onclick="checkColor('color-yellow')"></div>
            </div>

            <div id="nudge" class="nudge hidden">Need help?</div>
        </main>

        <aside id="chat-widget" class="chat-panel hidden">
            <div class="chat-header">
                <span>Assistant</span>
                <button id="close-chat">X</button>
            </div>
            <div id="chat-body" class="chat-body"></div>
            <div class="chat-input-row">
                <input id="chat-input" placeholder="Type your question..." />
                <button id="send-chat">Send</button>
            </div>
        </aside>
    </div>

    <script>
        const colors = [
            { id: 'color-red', name: 'RED', hex: '#ff5f5f' },
            { id: 'color-blue', name: 'BLUE', hex: '#5fafff' },
            { id: 'color-green', name: 'GREEN', hex: '#5fff8f' },
            { id: 'color-yellow', name: 'YELLOW', hex: '#ffff5f' }
        ];

        let currentTargetId = '';

        // Function to pick a random target on load
        function initTask() {
            // const randomIndex = Math.floor(Math.random() * colors.length);
            const randomIndex = 1;
            const target = colors[randomIndex];

            currentTargetId = target.id;
            const display = document.getElementById('target-display');
            display.innerText = target.name;
            display.style.color = target.hex;
            display.style.textShadow = "1px 1px 2px #000";
        }

        function checkColor(clickedId) {
            const feedback = document.getElementById('feedback-text');

            if (clickedId === currentTargetId) {
                // Success - move to next page
                window.location.href = "/task-selection";
            } else {
                // Failure - show feedback
                feedback.style.visibility = 'visible';
                setTimeout(() => { feedback.style.visibility = 'hidden'; }, 1500);
            }
        }
        
        // Initialize when page opens
        window.onload = function () {
            initTask();

            fetch("/api/browser_event", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    type: "task_state",
                    task: "Click the Color"
                })
            });
        };
    </script>

    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>

</html>
